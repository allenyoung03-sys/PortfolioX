name: PortfolioX
options:
  bundleIdPrefix: com.portfoliox
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  SWIFT_VERSION: "5.9"
  TARGETED_DEVICE_FAMILY: "1"

targets:
  PortfolioX:
    type: application
    platform: iOS
    sources:
      - path: .
    settings:
      base:
        INFOPLIST_FILE: PortfolioX/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.portfoliox.app
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
    info:
      path: PortfolioX/Info.plist
